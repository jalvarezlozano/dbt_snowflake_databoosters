version: 2

sources:
  - name: raw_bi_car
    database: DATABOOSTERS
    schema: public
    tables:
      - name: CAR_SALES
        description: "Tabla de datos de ventas desde la DB transaccional"
        columns:
          - name: DDATE
            description: "Fecha compra de auto"
          - name: SALESPERSON
            description: "Nombre del vendedor"
            tests:
              - not_null
          - name: CUSTOMERNAME
            description: "Nombre del cliente que compro el auto"
          - name: CARMAKE
            description: "Nombre de la marca del auto"
          - name: CARMODEL
            description: "Nombre del modelo"
          - name: CARMYEAR
            description: "Año del modelo"
          - name: SALEPRICE
            description: "Precio del auto"
          - name: COMMISSIONRATE
            description: "Porcentaje de comision del vendedor"
          - name: COMMISSIONEARNED
            description: "Valor de la comision del vendedor"
      - name: SALESPERSON
        description: "Tabla de vendedores"
        columns:
          - name: SALESPERSON_ID
            description: "ID del vendedor"
            tests:
              - not_null
          - name: SALESPERSON_NAME
            description: "Nombre del vendedor"
          - name: COMMISSIONRATE
            description: "Porcentaje de comision del vendedor"
          - name: STORE_ID
            description: "ID de la tienda"
          - name: STATUS
            description: "Status del vendedor"
          - name: LAST_UPDATED_TS
            description: "Ultima fecha de modificacion"
      - name: MARKETING_PIVOTED_PERFORMANCE
        description: "Tabla de vendedores"
        columns:
          - name: CAMPAIGN_ID
            description: "ID del vendedor"
          - name: REPORT_DATE
            description: "Nombre del vendedor"
          - name: CHANNEL_NAME
            description: "Porcentaje de comision del vendedor"
          - name: METRIC_NAME
            description: "ID de la tienda"
          - name: METRIC_VALUE
            description: "Status del vendedor"
      - name: REGIONAL_SALES_APAC
        description: "Tabla de vendedores"
      - name: REGIONAL_SALES_EU
        description: "Tabla de vendedores"
      - name: REGIONAL_SALES_NA
        description: "Tabla de vendedores"